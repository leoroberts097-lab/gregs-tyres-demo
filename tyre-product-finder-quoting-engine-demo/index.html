<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Greg's Tyres Quote Engine Demo</title>
  <meta name="description" content="Compact Greg's Tyres quote engine demo with supplier source checks and quote actions.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23ffffff'/%3E%3Ctext x='32' y='39' text-anchor='middle' font-family='Arial' font-size='20' font-weight='900' fill='%23e60012'%3EGT%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      --red: #e60012;
      --red-dark: #bf0010;
      --ink: #111111;
      --body: #333333;
      --muted: #667085;
      --line: #d7dde6;
      --soft: #f6f7f9;
      --white: #ffffff;
      --green: #137a45;
      --amber: #a15c00;
      --bad: #b42318;
      --shadow: 0 12px 28px rgba(17, 24, 39, 0.07);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--soft);
      color: var(--body);
      font-family: "Open Sans", Arial, sans-serif;
      line-height: 1.35;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      height: 66px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 8px 24px;
      background: var(--white);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 3px 12px rgba(17, 24, 39, 0.05);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .brand img {
      width: 122px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .brand-copy {
      min-width: 0;
      padding-left: 16px;
      border-left: 1px solid var(--line);
    }

    .brand-copy span {
      display: block;
      color: var(--red);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .brand-copy strong {
      display: block;
      margin-top: 2px;
      color: var(--ink);
      font-size: 18px;
      line-height: 1.15;
    }

    .status {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status strong {
      color: var(--green);
      margin-left: 4px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav-link {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .nav-link:hover,
    .nav-link:focus-visible {
      border-color: var(--red);
      color: var(--red-dark);
    }

    .page {
      height: calc(100vh - 66px);
      max-width: 1380px;
      margin: 0 auto;
      padding: 12px 18px;
      overflow: hidden;
    }

    .quote-grid {
      height: 100%;
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr) 280px;
      gap: 16px;
      align-items: stretch;
    }

    .panel {
      min-height: 0;
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      padding: 12px 16px 9px;
      border-bottom: 1px solid #edf0f4;
      background: #fff;
    }

    .panel-head h1,
    .panel-head h2 {
      color: var(--ink);
      font-size: 20px;
      line-height: 1.15;
      font-weight: 900;
    }

    .panel-head p {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel-body {
      padding: 12px 16px 14px;
    }

    .form-grid {
      display: grid;
      gap: 7px;
    }

    label {
      display: grid;
      gap: 3px;
      color: var(--ink);
      font-size: 12px;
      font-weight: 900;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid #cbd3df;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      outline: none;
      font-size: 14px;
      font-weight: 700;
    }

    input,
    select {
      height: 31px;
      padding: 0 10px;
    }

    textarea {
      height: 43px;
      resize: none;
      padding: 7px 10px;
      line-height: 1.18;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(230, 0, 18, 0.12);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .choice {
      min-height: 31px;
      padding: 5px 8px;
      border: 1px solid #cbd3df;
      border-radius: 6px;
      background: #fff;
      color: #1f2937;
      font-size: 12px;
      font-weight: 900;
      text-align: left;
    }

    .choice.active {
      border-color: var(--red);
      background: #fff1f2;
      color: var(--red-dark);
    }

    .primary-btn,
    .action-btn,
    .select-btn {
      border-radius: 6px;
      font-weight: 900;
      border: 1px solid transparent;
    }

    .primary-btn {
      height: 35px;
      width: 100%;
      background: var(--red);
      color: #fff;
      font-size: 14px;
    }

    .primary-btn:hover,
    .primary-btn:focus-visible {
      background: var(--red-dark);
    }

    .options-panel {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .quote-list {
      min-height: 0;
      display: grid;
      grid-template-rows: repeat(3, 1fr);
    }

    .quote-card {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 12px;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid #edf0f4;
      background: #fff;
    }

    .quote-card:last-child {
      border-bottom: 0;
    }

    .quote-card.selected {
      background: #fff9f9;
      box-shadow: inset 4px 0 0 var(--red);
    }

    .quote-role {
      display: block;
      margin-bottom: 4px;
      color: var(--red-dark);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .quote-card:not(.selected) .quote-role {
      color: #344054;
    }

    .quote-card h3 {
      color: var(--ink);
      font-size: 19px;
      line-height: 1.12;
    }

    .quote-card p {
      margin-top: 5px;
      color: #475467;
      font-size: 13px;
      line-height: 1.3;
    }

    .quote-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 3px 14px;
      margin-top: 7px;
      color: #344054;
      font-size: 12px;
      font-weight: 800;
    }

    .price-block {
      text-align: right;
    }

    .price {
      display: block;
      color: var(--ink);
      font-size: 25px;
      line-height: 1;
      font-weight: 900;
    }

    .price-block small {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    .select-btn {
      height: 31px;
      margin-top: 9px;
      padding: 0 10px;
      border-color: #cbd3df;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
    }

    .quote-card.selected .select-btn {
      border-color: var(--red);
      background: var(--red);
      color: #fff;
    }

    .side {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      gap: 12px;
    }

    .source-list {
      display: grid;
      gap: 11px;
    }

    .source-row {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr);
      gap: 9px;
      align-items: center;
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
    }

    .source-row span:last-child {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
    }

    .dot.green {
      background: var(--green);
    }

    .dot.amber {
      background: var(--amber);
    }

    .dot.red {
      background: var(--bad);
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    .action-btn {
      min-height: 46px;
      padding: 8px 10px;
      border-color: #cbd3df;
      background: #fff;
      color: var(--ink);
      text-align: left;
      font-size: 13px;
    }

    .action-btn:hover,
    .action-btn:focus-visible {
      border-color: var(--red);
      color: var(--red-dark);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 20;
      transform: translate(-50%, 18px);
      max-width: min(520px, calc(100vw - 32px));
      padding: 11px 13px;
      border-radius: 7px;
      background: var(--ink);
      color: #fff;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(17, 24, 39, 0.52);
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      width: min(720px, 100%);
      max-height: min(720px, calc(100vh - 36px));
      overflow: auto;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 28px 80px rgba(17, 24, 39, 0.28);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px 14px;
      border-bottom: 1px solid #edf0f4;
    }

    .modal-head h2 {
      color: var(--ink);
      font-size: 22px;
      line-height: 1.15;
      font-weight: 900;
    }

    .modal-head p {
      margin-top: 5px;
      color: var(--muted);
      font-size: 13px;
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: 1px solid #cbd3df;
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 20px;
      line-height: 1;
    }

    .modal-body {
      display: grid;
      gap: 14px;
      padding: 18px 20px 20px;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .record-box {
      min-height: 72px;
      padding: 12px;
      border: 1px solid #d7dde6;
      border-radius: 7px;
      background: #f8fafc;
    }

    .record-box strong {
      display: block;
      color: var(--ink);
      font-size: 12px;
      text-transform: uppercase;
    }

    .record-box span,
    .record-box p {
      display: block;
      margin-top: 5px;
      color: #344054;
      font-size: 14px;
      line-height: 1.35;
      font-weight: 700;
    }

    .message-preview {
      padding: 13px;
      border: 1px solid #d7dde6;
      border-left: 4px solid var(--red);
      border-radius: 7px;
      background: #fff;
      color: #344054;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
    }

    @media (max-width: 980px) {
      html,
      body {
        height: auto;
        min-height: 100%;
        overflow: auto;
      }

      .topbar {
        height: auto;
        display: grid;
        justify-content: stretch;
        padding: 12px 16px;
      }

      .brand {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 12px;
      }

      .brand img {
        width: 90px;
      }

      .brand-copy {
        padding-left: 12px;
      }

      .brand-copy span {
        font-size: 10px;
      }

      .brand-copy strong {
        font-size: 16px;
      }

      .page {
        height: auto;
        padding: 14px;
        overflow: visible;
      }

      .quote-grid,
      .quote-list,
      .side,
      .record-grid {
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="https://gregstyres.com.au/_next/image?url=%2Fbrand%20logos%2FTypeA-Service-Sponsorship-Logo.png&w=640&q=75" alt="Greg's Tyres and Mechanical logo">
      <div class="brand-copy">
        <span>Quote engine concept</span>
        <strong>Greg's Tyres & Mechanical</strong>
      </div>
    </div>
    <div class="top-actions">
      <a class="nav-link" href="../gregs-operations-canvas-demo/index.html#card-staff-quote-engine">Back to canvas</a>
      <a class="nav-link" href="../online-pricing-booking-engine-demo/index.html">Customer quote page</a>
      <div class="status" id="statusText">Quote status</div>
    </div>
  </header>

  <main class="page">
    <section class="quote-grid" aria-label="Tyre quote engine">
      <article class="panel" aria-labelledby="form-title">
        <div class="panel-head">
          <h1 id="form-title">Build quote</h1>
          <p>Front desk enters the job once.</p>
        </div>
        <div class="panel-body">
          <form class="form-grid" id="quoteForm">
            <label>Customer
              <input id="customerName" autocomplete="name">
            </label>
            <label>Mobile
              <input id="customerMobile" autocomplete="tel">
            </label>
            <label>Vehicle or rego
              <input id="vehicle">
            </label>
            <label>Tyre size
              <select id="tyreSize">
                <option value=""></option>
                <option>265/65R17</option>
                <option>205/55R16</option>
                <option>285/70R17</option>
                <option>245/70R16</option>
                <option>16.9-28</option>
              </select>
            </label>
            <label>Driving or work type
              <div class="choice-grid" role="group" aria-label="Driving or work type">
                <button type="button" class="choice" data-use="rural">Rural roads</button>
                <button type="button" class="choice" data-use="daily">Daily</button>
                <button type="button" class="choice" data-use="towing">4WD / towing</button>
                <button type="button" class="choice" data-use="commercial">Commercial</button>
              </div>
            </label>
            <label>Priority
              <select id="priority">
                <option value=""></option>
                <option value="value">Best value</option>
                <option value="price">Lowest price</option>
                <option value="today">Available today</option>
                <option value="life">Longest life</option>
                <option value="brand">Premium brand</option>
              </select>
            </label>
            <label>Request
              <textarea id="request"></textarea>
            </label>
            <button class="primary-btn" type="submit">Check options</button>
          </form>
        </div>
      </article>

      <article class="panel options-panel" aria-labelledby="options-title">
        <div class="panel-head">
          <h2 id="options-title">Quote options</h2>
          <p id="quoteContext"></p>
        </div>
        <div class="quote-list" id="quoteOptions"></div>
      </article>

      <aside class="side">
        <article class="panel" aria-labelledby="sources-title">
          <div class="panel-head">
            <h2 id="sources-title">Data checked</h2>
          </div>
          <div class="panel-body">
            <div class="source-list" id="sourceList"></div>
          </div>
        </article>

        <article class="panel">
          <div class="panel-body actions" aria-label="Quote actions">
            <button class="action-btn" type="button" id="publishQuote">Publish quote to system</button>
            <button class="action-btn" type="button" id="sendMessage">Send customer message</button>
            <button class="action-btn" type="button" id="holdBooking">Create booking hold</button>
          </div>
        </article>
      </aside>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <div class="modal" id="outputModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle">Output ready</h2>
          <p id="modalSub">Generated from the selected quote option.</p>
        </div>
        <button class="modal-close" type="button" id="closeModal" aria-label="Close output">x</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script>
    const products = [
      {
        label: "Recommended",
        source: "Marlin / Bridgestone",
        brand: "Bridgestone",
        model: "Dueler A/T 697",
        tier: "Premium",
        fit: ["rural", "towing", "commercial"],
        cost: 238,
        margin: 0.34,
        stock: "4 in local stock",
        eta: "Available today",
        reason: "Strong fit for Mudgee rural roads, 4WD use and customers who value known brands."
      },
      {
        label: "Best value",
        source: "Hankook supplier portal",
        brand: "Hankook",
        model: "Dynapro AT2",
        tier: "Mid",
        fit: ["rural", "daily", "commercial"],
        cost: 184,
        margin: 0.37,
        stock: "8 from supplier",
        eta: "Available tomorrow",
        reason: "Good all-round option where the customer wants value without moving to the cheapest tyre."
      },
      {
        label: "Budget option",
        source: "Budget supplier",
        brand: "Winrun",
        model: "Maxclaw H/T",
        tier: "Entry",
        fit: ["daily", "budget"],
        cost: 118,
        margin: 0.44,
        stock: "6 in local stock",
        eta: "Available today",
        reason: "Lowest upfront price where the job is a basic replacement and the customer is price-led."
      },
      {
        label: "Long-life option",
        source: "Michelin supplier portal",
        brand: "Michelin",
        model: "LTX Trail",
        tier: "Premium",
        fit: ["daily", "rural", "life"],
        cost: 226,
        margin: 0.31,
        stock: "2 from supplier",
        eta: "2 days",
        reason: "Strong long-life option where comfort, tyre life and brand trust matter most."
      },
      {
        label: "Heavy-use option",
        source: "Toyo / Falken supplier portal",
        brand: "Toyo",
        model: "Open Country A/T III",
        tier: "Premium",
        fit: ["field", "towing", "commercial"],
        cost: 246,
        margin: 0.32,
        stock: "Needs confirmation",
        eta: "Check supplier",
        reason: "Good candidate for harsh conditions, field use and heavy work, subject to stock confirmation."
      }
    ];

    const sources = [
      { name: "Marlin / Bridgestone", color: "green" },
      { name: "Michelin", color: "green" },
      { name: "Hankook", color: "green" },
      { name: "Toyo / Falken", color: "amber" },
      { name: "Local stock", color: "green" }
    ];

    const state = {
      use: "",
      selectedId: 0,
      checked: false
    };

    const els = {
      customerName: document.getElementById("customerName"),
      customerMobile: document.getElementById("customerMobile"),
      vehicle: document.getElementById("vehicle"),
      tyreSize: document.getElementById("tyreSize"),
      priority: document.getElementById("priority"),
      request: document.getElementById("request"),
      quoteContext: document.getElementById("quoteContext"),
      quoteOptions: document.getElementById("quoteOptions"),
      sourceList: document.getElementById("sourceList"),
      statusText: document.getElementById("statusText"),
      toast: document.getElementById("toast")
    };
    els.outputModal = document.getElementById("outputModal");
    els.modalTitle = document.getElementById("modalTitle");
    els.modalSub = document.getElementById("modalSub");
    els.modalBody = document.getElementById("modalBody");
    els.closeModal = document.getElementById("closeModal");

    function money(value) {
      return "$" + Math.round(value).toLocaleString("en-AU");
    }

    function sell(product) {
      return product.cost * (1 + product.margin);
    }

    function priorityScore(product) {
      if (els.priority.value === "price" && product.tier === "Entry") return 24;
      if (els.priority.value === "today" && product.eta === "Available today") return 24;
      if (els.priority.value === "life" && product.label.includes("Long")) return 24;
      if (els.priority.value === "brand" && product.tier === "Premium") return 16;
      if (els.priority.value === "value" && product.tier === "Mid") return 18;
      return 0;
    }

    function fitScore(product) {
      return product.fit.includes(state.use) ? 32 : 0;
    }

    function stockScore(product) {
      if (product.eta === "Available today") return 18;
      if (product.eta === "Available tomorrow") return 12;
      if (product.eta === "2 days") return 7;
      return -8;
    }

    function rankedProducts() {
      return products
        .map((product, index) => ({ ...product, id: index, score: Math.min(99, Math.max(35, 40 + fitScore(product) + priorityScore(product) + stockScore(product))) }))
        .sort((a, b) => b.score - a.score);
    }

    function selectedProduct() {
      return products[state.selectedId] || rankedProducts()[0];
    }

    function currentCustomer() {
      return {
        name: els.customerName.value.trim() || "Customer",
        mobile: els.customerMobile.value.trim() || "No mobile",
        vehicle: els.vehicle.value.trim() || "Vehicle",
        size: els.tyreSize.value
      };
    }

    function renderSources() {
      if (!state.checked) {
        els.sourceList.innerHTML = "";
        return;
      }
      els.sourceList.innerHTML = sources.map(source => `
        <div class="source-row">
          <span class="dot ${source.color}"></span>
          <span>${source.name}</span>
        </div>
      `).join("");
    }

    function renderOptions() {
      if (!state.checked) {
        els.quoteContext.textContent = "";
        els.quoteOptions.innerHTML = "";
        return;
      }
      const customer = currentCustomer();
      const ranked = rankedProducts().slice(0, 3);
      if (!ranked.some(product => product.id === state.selectedId)) {
        state.selectedId = ranked[0].id;
      }
      els.quoteContext.textContent = `${customer.name} - ${customer.vehicle}, ${customer.size}.`;
      els.quoteOptions.innerHTML = ranked.map((product, index) => {
        const selected = product.id === state.selectedId;
        const label = index === 0 ? "Recommended" : product.label;
        return `
          <article class="quote-card ${selected ? "selected" : ""}">
            <div>
              <span class="quote-role">${label}</span>
              <h3>${product.brand} ${product.model}</h3>
              <p>${product.reason}</p>
              <div class="quote-details">
                <span>${product.eta}</span>
                <span>${product.stock}</span>
                <span>${product.source}</span>
                <span>${Math.round(product.margin * 100)}% margin</span>
              </div>
            </div>
            <div class="price-block">
              <span class="price">${money(sell(product))}</span>
              <small>per tyre estimate</small>
              <button class="select-btn" type="button" data-select="${product.id}">${selected ? "Selected" : "Select"}</button>
            </div>
          </article>
        `;
      }).join("");

      document.querySelectorAll("[data-select]").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedId = Number(button.dataset.select);
          state.checked = true;
          els.statusText.innerHTML = "Quote status: <strong>Selected</strong>";
          renderAll();
          showToast("Quote option selected.");
        });
      });
    }

    function renderAll() {
      renderSources();
      renderOptions();
    }

    function chooseBest() {
      state.checked = true;
      state.selectedId = rankedProducts()[0].id;
      els.statusText.innerHTML = "Quote status: <strong>Checked</strong>";
      renderAll();
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    function requireChecked() {
      if (!state.checked) {
        showToast("Check options first.");
        return false;
      }
      return true;
    }

    function modalTemplate(type) {
      const customer = currentCustomer();
      const product = selectedProduct();
      const total = money(sell(product) * 4);
      if (type === "publish") {
        return {
          title: "Quote published to system",
          sub: "Internal quote record, CRM note and Marlin note are ready for staff review.",
          body: `
            <div class="record-grid">
              <div class="record-box"><strong>Customer</strong><span>${customer.name}<br>${customer.mobile}</span></div>
              <div class="record-box"><strong>Vehicle</strong><span>${customer.vehicle}<br>${customer.size || "Tyre size to confirm"}</span></div>
              <div class="record-box"><strong>Selected tyre</strong><span>${product.brand} ${product.model}<br>${product.stock}</span></div>
              <div class="record-box"><strong>Quote estimate</strong><span>${money(sell(product))} per tyre<br>${total} four-tyre estimate</span></div>
              <div class="record-box"><strong>Internal destinations</strong><span>Quote DB record<br>CRM timeline note<br>Marlin note for staff</span></div>
              <div class="record-box"><strong>Staff check</strong><span>Fitment and stock confirmed before customer booking is locked.</span></div>
            </div>`
        };
      }
      if (type === "message") {
        return {
          title: "Customer message prepared",
          sub: "Plain-English quote message ready to send after staff confirmation.",
          body: `
            <div class="message-preview">Hi ${customer.name}, Greg's Tyres has checked options for your ${customer.vehicle}. Our current recommendation is ${product.brand} ${product.model} at about ${money(sell(product))} per tyre. It suits the requested use and current stock position. Reply YES and we can hold a booking time, or call us if you want to compare options.</div>
            <div class="record-grid">
              <div class="record-box"><strong>Send path</strong><span>SMS/email message to customer</span></div>
              <div class="record-box"><strong>Follow-up</strong><span>If no reply today, create a quote follow-up task for front desk.</span></div>
            </div>`
        };
      }
      return {
        title: "Booking hold created",
        sub: "Provisional workshop hold with stock and staff confirmation steps.",
        body: `
          <div class="record-grid">
            <div class="record-box"><strong>Hold type</strong><span>Provisional tyre fitment slot</span></div>
            <div class="record-box"><strong>Customer</strong><span>${customer.name}<br>${customer.mobile}</span></div>
            <div class="record-box"><strong>Stock note</strong><span>${product.stock}<br>${product.source}</span></div>
            <div class="record-box"><strong>Workshop note</strong><span>Confirm fitment, load rating and upsell alignment check.</span></div>
          </div>
          <div class="message-preview">Booking hold is not final until staff confirms stock and fitment. If the tyre is not available, the follow-up workflow keeps the quote open.</div>`
      };
    }

    function openModal(type) {
      if (!requireChecked()) return false;
      const output = modalTemplate(type);
      els.modalTitle.textContent = output.title;
      els.modalSub.textContent = output.sub;
      els.modalBody.innerHTML = output.body;
      els.outputModal.classList.add("show");
      return true;
    }

    document.getElementById("quoteForm").addEventListener("submit", event => {
      event.preventDefault();
      chooseBest();
      showToast("Supplier and stock options checked.");
    });

    document.querySelectorAll("[data-use]").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-use]").forEach(item => item.classList.remove("active"));
        button.classList.add("active");
        state.use = button.dataset.use;
        if (state.checked) {
          chooseBest();
        }
      });
    });

    [els.customerName, els.customerMobile, els.vehicle, els.tyreSize, els.priority, els.request].forEach(input => {
      input.addEventListener("input", () => {
        if (state.checked) {
          chooseBest();
        }
      });
    });

    document.getElementById("publishQuote").addEventListener("click", () => {
      if (openModal("publish")) els.statusText.innerHTML = "Quote status: <strong>Published</strong>";
    });

    document.getElementById("sendMessage").addEventListener("click", () => {
      if (openModal("message")) els.statusText.innerHTML = "Quote status: <strong>Message ready</strong>";
    });

    document.getElementById("holdBooking").addEventListener("click", () => {
      if (openModal("booking")) els.statusText.innerHTML = "Quote status: <strong>Booking held</strong>";
    });

    els.closeModal.addEventListener("click", () => els.outputModal.classList.remove("show"));
    els.outputModal.addEventListener("click", event => {
      if (event.target === els.outputModal) els.outputModal.classList.remove("show");
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") els.outputModal.classList.remove("show");
    });

    renderAll();
  </script>
</body>
</html>
